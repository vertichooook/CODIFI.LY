<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Codifi.ly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617; --card-bg: rgba(15, 23, 42, 0.8);
            --accent-blue: #38bdf8; --text-main: #f8fafc;
            --input-bg: rgba(255, 255, 255, 0.05); --input-border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-dark: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a; --input-bg: #ffffff; --input-border: #cbd5e1;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; transition: 0.3s; }

        .auth-card { background: var(--card-bg); padding: 50px 40px; border-radius: 24px; width: 100%; max-width: 420px; border: 1px solid var(--input-border); backdrop-filter: blur(10px); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); margin: auto; }

        .form-control { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 16px; border-radius: 12px; }
        .form-control:focus { background: var(--input-bg); color: var(--text-main); border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }
        .btn-auth { background: var(--accent-blue); color: #000; font-weight: 800; width: 100%; padding: 16px; border-radius: 12px; border: none; transition: 0.3s; }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="p-4"><a href="/" class="text-decoration-none fw-bold fs-3" style="color: var(--text-main);">CODIFI<span style="color:var(--accent-blue)">.LY</span></a></nav>

    <div class="auth-card">
        <div id="login-section" class="form-section active">
            <h3 class="fw-bold mb-4" data-i18n="welcome_back">С возвращением!</h3>
            <form action="/login" method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Логин" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Пароль" required>
                <button type="submit" class="btn-auth" data-i18n="login_btn">Войти</button>
            </form>
            <p class="mt-4 small opacity-75">Нет аккаунта? <a href="#" onclick="switchForm('register')" class="text-info text-decoration-none fw-bold">Создать</a></p>
        </div>

        <div id="register-section" class="form-section">
            <h3 class="fw-bold mb-4" data-i18n="register_title">Регистрация</h3>
            <form action="/register" method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Придумайте логин" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Пароль" required>
                <button type="submit" class="btn-auth" data-i18n="reg_btn">Начать обучение</button>
            </form>
            <p class="mt-4 small opacity-75">Уже есть профиль? <a href="#" onclick="switchForm('login')" class="text-info text-decoration-none fw-bold">Войти</a></p>
        </div>
    </div>

    <script>
        const translations = {
            ru: { welcome_back: "С возвращением!", login_btn: "Войти в аккаунт", register_title: "Регистрация", reg_btn: "Начать обучение" },
            en: { welcome_back: "Welcome Back!", login_btn: "Login", register_title: "Register", reg_btn: "Start Learning" },
            de: { welcome_back: "Willkommen zurück!", login_btn: "Anmelden", register_title: "Registrieren", reg_btn: "Lernen starten" }
        };

        function syncAppSettings() {
            const theme = localStorage.getItem('theme') || 'dark';
            const lang = localStorage.getItem('lang') || 'ru';
            document.body.className = theme === 'light' ? 'light-mode' : '';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
        }

        function switchForm(target) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${target}-section`).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', syncAppSettings);
    </script>
</body>
</html>
